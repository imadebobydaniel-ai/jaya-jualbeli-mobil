<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Data Jemaat - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ffc107; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --error: #ef4444; --success: #22c55e; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding-top: 80px; }
        .hidden { display: none !important; }

        header { 
            background: #000; padding: 15px 30px; border-bottom: 3px solid var(--primary); 
            display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; width: 100%; z-index: 1000;
        }

        .container { max-width: 1100px; margin: 20px auto; padding: 0 20px; }
        .form-card { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid rgba(255,193,7,0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        h2 { color: var(--primary); margin: 30px 0 20px; border-left: 5px solid var(--primary); padding-left: 15px; font-size: 1.5rem; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #cbd5e1; }
        input, select, textarea {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; outline: none;
        }
        input:focus, select:focus { border-color: var(--primary); }
        input[readonly] { background: #1e293b; color: var(--primary); font-weight: bold; border: 1px dashed var(--primary); }

        .profile-section { text-align: center; margin-bottom: 40px; }
        .profile-img { width: 150px; height: 150px; border-radius: 50%; border: 4px solid var(--primary); object-fit: cover; margin-bottom: 15px; }
        .upload-box { 
            background: rgba(15, 23, 42, 0.6); border: 2px dashed #475569; padding: 15px; 
            border-radius: 10px; text-align: center; cursor: pointer; transition: 0.3s; display: block;
        }
        .upload-box.uploaded { border-color: var(--success); background: rgba(34, 197, 94, 0.1); color: var(--success); }
        .upload-box input[type="file"] { display:none; } /* Hide the default file input */

        .radio-group { display: flex; flex-wrap: wrap; gap: 15px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; }
        .radio-group label { display: flex; align-items: center; gap: 8px; cursor: pointer; margin-bottom: 0; }
        .radio-group input[type="radio"] { width: auto; }

        .btn-action { 
            background: var(--primary); color: #000; border: none; padding: 18px; border-radius: 8px; 
            font-weight: bold; cursor: pointer; width: 100%; font-size: 1.1rem; margin-top: 40px;
            transition: 0.3s;
        }
        .btn-action:disabled { background: #475569; cursor: not-allowed; opacity: 0.6; }

        .sub-group { background: rgba(255, 193, 7, 0.05); padding: 20px; border-radius: 10px; margin-top: 10px; border: 1px solid rgba(255, 193, 7, 0.1); }
        .mandatory { color: var(--error); }
        .bold-text { font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div style="display:flex; align-items:center; gap:15px;">
        <img src="logo_pope.png" alt="Logo" style="height: 45px;">
        <h4 style="color: var(--primary); letter-spacing: 1px;">PONDOK PEMULIHAN PAPUA</h4>
    </div>
    <button onclick="window.location.reload()" style="background:var(--error); color:white; border:none; padding:8px 15px; border-radius:5px; font-weight:bold;">LOGOUT</button>
</header>

<div class="container">
    <div class="form-card">
        <form id="mainForm">
            <div class="profile-section">
                <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="p-preview" class="profile-img">
                <label class="upload-box" id="box-foto">
                    <i class="fas fa-camera"></i> Upload Foto Profil
                    <input type="file" accept="image/*" id="foto-profil-input">
                </label>
            </div>

            <h2><i class="fas fa-id-badge"></i> Registrasi Sistem</h2>
            <div class="form-group">
                <label>Nomor Induk Jemaat (Otomatis)</label>
                <input type="text" id="nij_display" name="nij" readonly>
            </div>

            <h2><i class="fas fa-address-card"></i> Identitas Pribadi</h2>
            <div class="form-group">
                <label>Nama Lengkap <span class="mandatory">*</span></label>
                <input type="text" name="nama" required placeholder="Masukkan Nama Lengkap Sesuai KTP">
            </div>

            <div class="grid-2">
                <div class="form-group"><label>Alamat KTP <span class="mandatory">*</span></label><textarea name="alt_ktp" rows="2" required></textarea></div>
                <div class="form-group"><label>Alamat Domisili</label><textarea name="alt_dom" rows="2"></textarea></div>
            </div>

            <div class="form-group">
                <label>Status Pernikahan <span class="mandatory">*</span></label>
                <div class="radio-group">
                    <label><input type="radio" name="st_nikah" value="Menikah" onclick="toggleMarriageFields(true)" required> Menikah</label>
                    <label><input type="radio" name="st_nikah" value="Duda_Cerai_Mati" onclick="toggleMarriageFields(false)"> Duda (Cerai Mati)</label>
                    <label><input type="radio" name="st_nikah" value="Duda_Cerai_Hidup" onclick="toggleMarriageFields(true)"> Duda (Cerai Hidup)</label>
                    <label><input type="radio" name="st_nikah" value="Janda_Cerai_Mati" onclick="toggleMarriageFields(false)"> Janda (Cerai Mati)</label>
                    <label><input type="radio" name="st_nikah" value="Janda_Cerai_Hidup" onclick="toggleMarriageFields(true)"> Janda (Cerai Hidup)</label>
                    <label><input type="radio" name="st_nikah" value="Single" onclick="toggleMarriageFields(false)"> Single</label>
                </div>
            </div>

            <div id="marriage-details" class="sub-group hidden">
                <label>Data Pasangan</label>
                <div class="grid-2">
                    <select id="pilih_pasangan">
                        <option value="Suami">Suami</option>
                        <option value="Istri">Istri</option>
                    </select>
                    <input type="text" id="nama_pasangan" placeholder="Nama Pasangan">
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group"><label>NIK KTP <span class="mandatory">*</span></label><input type="number" name="nik_ktp" required></div>
                <div class="form-group"><label>NIK KK <span class="mandatory">*</span></label><input type="number" name="nik_kk" required></div>
            </div>

            <div class="grid-2">
                <div class="form-group"><label>Provinsi Tempat Lahir <span class="mandatory">*</span></label><input type="text" name="provinsi_lahir" required></div>
                <div class="form-group"><label>Kota Tempat Lahir <span class="mandatory">*</span></label><input type="text" name="kota_lahir" required></div>
            </div>

            <div class="form-group">
                <label>Pekerjaan <span class="mandatory">*</span></label>
                <select name="pekerjaan" required>
                    <option value="">-- Pilih Pekerjaan --</option>
                    <option>TNI</option>
                    <option>Polri</option>
                    <option>ASN</option>
                    <option>P3K</option>
                    <option>Honorer</option>
                    <option>Swasta</option>
                    <option>Wiraswasta</option>
                    <option>Profesional</option>
                    <option>Guru</option>
                    <option>Dosen</option>
                    <option>Pejabat Publik</option>
                    <option>Pejabat Eksekutif</option>
                    <option>Bidang Kerohaniaan</option>
                </select>
            </div>

            <div class="form-group">
                <label>Jumlah Anak</label>
                <input type="number" id="jumlah_anak" min="0" oninput="generateAnakFields(this.value)">
            </div>
            <div id="anak-fields-container"></div>

            <div class="form-group">
                <label>Jumlah Total yang Tinggal Serumah</label>
                <input type="number" name="total_serumah" min="1">
            </div>

            <div class="form-group">
                <label>Golongan Darah</label>
                <select name="golongan_darah">
                    <option value="">-- Pilih Golongan Darah --</option>
                    <option>O</option>
                    <option>A</option>
                    <option>B</option>
                    <option>AB</option>
                    <option>AB+</option>
                </select>
            </div>

            <div class="grid-2">
                <div class="form-group"><label>No. WA <span class="mandatory">*</span></label><input type="text" name="no_wa" placeholder="0812..." required></div>
                <div class="form-group"><label>Email</label><input type="email" name="email"></div>
            </div>

            <div class="form-group">
                <label>No Darurat (Keluarga Inti / Jauh)</label>
                <input type="text" name="no_darurat" placeholder="Nama dan Nomor Telepon">
            </div>

            <h2><i class="fas fa-church"></i> Data Gerejawi</h2>
            
            <div class="form-group">
                <label>Lokasi Berjemaat <span class="mandatory">*</span></label>
                <select name="lokasi_berjemaat" required>
                    <option value="">-- Pilih Lokasi --</option>
                    <option>Pondok Pemulihan Abepura</option>
                    <option>Pondok Pemulihan Sentani</option>
                    <option>Pondok Pemulihan Doyo</option>
                    <option>Pondok Pemulihan Arso 1</option>
                    <option>Pondok Pemulihan Arso 2</option>
                </select>
            </div>

            <div class="form-group">
                <label>Aktif dalam Komsel</label>
                <select name="komsel">
                    <option value="">-- Pilih Komsel --</option>
                    <option>Komsel Lansia</option>
                    <option>Komsel Bapak</option>
                    <option>Komsel Ibu</option>
                    <option>Komsel Profesi</option>
                    <option>Komsel Mahasiswa</option>
                    <option>Komsel Pelajar</option>
                    <option>Komsel Sekolah Minggu</option>
                </select>
            </div>

            <div class="form-group">
                <label>Status Keanggotaan Jemaat <span class="mandatory">*</span></label>
                <div class="radio-group">
                    <label><input type="radio" name="status_keanggotaan" value="Aktif" required> Anggota Jemaat Aktif</label>
                    <label><input type="radio" name="status_keanggotaan" value="Tidak Aktif"> Anggota Jemaat Tidak Aktif</label>
                </div>
            </div>

            <div class="form-group">
                <label>Jabatan Pelayanan Gereja</label>
                <select id="jabatan_pelayanan" onchange="handleJabatanChange(this.value)">
                    <option value="">-- Pilih Jabatan --</option>
                    <option value="Gembala Sidang">Gembala Sidang</option>
                    <option value="Wakil Gembala Sidang">Wakil Gembala Sidang</option>
                    <option value="Sekertaris Gereja">Sekertaris Gereja</option>
                    <option value="Bendahara Gereja">Bendahara Gereja</option>
                    <option value="Koordinator / Pemimpin">Koordinator / Pemimpin</option>
                    <option value="PKS Komsel">PKS Komsel</option>
                    <option value="Pendoa Syafaat">Pendoa Syafaat</option>
                    <option value="Penatua / Diaken">Penatua / Diaken</option>
                    <option value="Jemaat Ordinari">Jemaat Ordinari</option>
                    <option value="Musik">Pelayanan Musik Spesifik</option>
                    <option value="Vocal">Vocal & Singers Spesifik</option>
                    <option value="Multimedia">Multimedia Spesifik</option>
                    <option value="Sound">Sound & Elektrikal Spesifik</option>
                    <option value="Tamborin">Tamborin & Flags Spesifik</option>
                    <option value="User">User Spesifik</option>
                    <option value="Misi">Bidang Misi Spesifik</option>
                    <option value="Keamanan">Perparkiran & Keamanan Spesifik</option>
                </select>
            </div>

            <div id="sub-pelayanan-box" class="sub-group hidden">
                <label id="sub-pelayanan-label">Detail Sub Pelayanan</label>
                <select id="sub-pelayanan-select"></select>
            </div>

            <h2><i class="fas fa-file-upload"></i> Dokumen Pendukung <small class="mandatory">(Wajib)</small></h2>
            <div class="grid-2">
                <label class="upload-box" id="box-ktp">
                    <i class="fas fa-upload"></i> Upload KTP
                    <input type="file" accept=".pdf, image/*" name="ktp_file" onchange="updateUploadBox(this, 'box-ktp')">
                </label>
                <label class="upload-box" id="box-kk">
                    <i class="fas fa-upload"></i> Upload KK
