<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi - Pondok Pemulihan Papua</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style> 
        :root { --primary: #ffc107; --bg: #0f172a; --card: #1e293b; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        body {
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; position: relative; margin: 0;
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)), 
                        url('poster_papua.jpg') no-repeat center center fixed;
            background-size: cover; color: white;
        }

        /* Overlay Login */
        #login-overlay { 
            position: fixed; inset: 0; 
            background: rgba(15, 23, 42, 0.98); 
            display: flex; justify-content: center; align-items: center; 
            z-index: 100000; 
        }
        
        .login-card { 
            background: rgba(255, 255, 255, 0.05); padding: 40px; 
            border-radius: 15px; border: 1px solid var(--primary); 
            width: 100%; max-width: 400px; text-align: center; 
            backdrop-filter: blur(10px); 
        }

        .main-container {
            position: fixed; top: 80px; width: 100%; height: calc(100% - 80px);
            padding: 20px; overflow-y: auto; display: flex; flex-direction: column;
            align-items: center; z-index: 10;
        }

        #top-bar-info { 
            position: fixed; top: 0; left: 0; width: 100%; height: 80px; 
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(15px); 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 30px; border-bottom: 2px solid var(--primary); z-index: 100; 
        }

        .hidden { display: none !important; }
        
        /* Form & Cards */
        .card-form { background: var(--card); padding: 30px; border-radius: 15px; width: 100%; max-width: 900px; border: 1px solid var(--primary); margin-bottom: 50px; }
        .section-title { color: var(--primary); font-weight: bold; margin: 25px 0 10px; border-bottom: 1px solid #444; padding-bottom: 5px; text-align: left; text-transform: uppercase; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; text-align: left; }
        
        input, select { padding: 10px; border-radius: 5px; border: 1px solid #475569; background: #0f172a; color: white; }
        input[type="file"] { border: 1px dashed var(--primary); cursor: pointer; }

        .btn-masuk, .btn-submit { background: var(--primary); color: black; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-batal { background: #e11d48; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <img src="logo_pope.png" style="width: 80px; margin-bottom: 20px;">
            <h2 style="color: var(--primary);">ADMIN PORTAL</h2>
            <p style="font-size: 0.8rem; margin-bottom: 20px; color: #ccc;">Silahkan masuk untuk akses database</p>
            <form id="loginForm">
                <input type="text" id="username_input" placeholder="Username" required style="width:100%; margin-bottom:10px; padding:12px; border-radius:8px;">
                <input type="password" id="password_input" placeholder="Password" required style="width:100%; margin-bottom:20px; padding:12px; border-radius:8px;">
                <button type="submit" class="btn-masuk" style="width:100%">MASUK SISTEM</button>
            </form>
        </div>
    </div>

    <div id="top-bar-info" class="hidden">
        <div>
            <p id="display-date" style="font-size: 0.8rem;">Memuat...</p>
            <p id="display-clock" style="font-weight: bold; color: var(--primary);">00:00:00</p>
        </div>
        <h3 style="cursor:pointer;" onclick="tampilkanView('welcome-view')">PONDOK PEMULIHAN PAPUA</h3>
        <button onclick="prosesLogout()" class="btn-batal"><i class="fas fa-sign-out-alt"></i> LOGOUT</button>
    </div>

    <div class="main-container hidden" id="content-app">
        
        <section id="welcome-view">
            <img src="logo_pope.png" style="width: 150px; margin-bottom: 20px;">
            <h1 style="font-size: 2.5rem;">SELAMAT DATANG</h1>
            <h3 style="color: var(--primary); letter-spacing: 2px;">SISTEM INFORMASI DATA JEMAAT</h3>
            <div style="margin-top: 30px; display: flex; gap: 15px; justify-content: center;">
                <button onclick="tampilkanView('input-view')" style="padding: 15px 30px; background: var(--primary); border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">+ INPUT DATA JEMAAT</button>
                <button onclick="tampilkanView('database-view')" style="padding: 15px 30px; background: white; color: black; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">LIHAT DATABASE</button>
            </div>
        </section>

        <div id="input-view" class="hidden">
            <div class="card-form">
                <h2 style="text-align:center; color:var(--primary); margin-bottom:20px;">FORM PENDAFTARAN JEMAAT</h2>
                <form id="formJemaat">
                    <div class="section-title">A. IDENTITAS PRIBADI</div>
                    <div class="form-group"><label>Nama Lengkap *</label><input type="text" id="nama_lengkap" required></div>
                    <div class="form-grid">
                        <div class="form-group"><label>Alamat Domisili</label><input type="text" id="alamat_domisili"></div>
                        <div class="form-group"><label>No. WhatsApp *</label><input type="tel" id="no_wa" required></div>
                    </div>

                    <div class="section-title">B. UNGGAH DOKUMEN</div>
                    <div class="form-group">
                        <label>Foto Profil (JPG/PNG)</label>
                        <input type="file" id="up_foto" accept="image/*">
                    </div>
                    <div class="form-grid">
                        <div class="form-group"><label>KTP (PDF)</label><input type="file" id="up_ktp" accept=".pdf"></div>
                        <div class="form-group"><label>KK (PDF)</label><input type="file" id="up_kk" accept=".pdf"></div>
                    </div>

                    <div style="display: flex; gap: 10px; margin-top: 30px;">
                        <button type="submit" id="btn-simpan" class="btn-submit" style="flex:2">SIMPAN DATA</button>
                        <button type="button" onclick="tampilkanView('welcome-view')" style="flex:1; background:#444; color:white; border:none; border-radius:8px;">BATAL</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="database-view" class="hidden" style="width: 100%; max-width: 1100px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="color: var(--primary);">DATABASE JEMAAT</h2>
                <button onclick="tampilkanView('welcome-view')" class="btn-submit">KEMBALI</button>
            </div>
            <div id="tabel-container"></div>
        </div>
    </div>

    <script type="module">
        // --- LOGIC LOGIN & AUTO-LOGIN ---
        const overlay = document.getElementById('login-overlay');
        const topBar = document.getElementById('top-bar-info');
        const appContent = document.getElementById('content-app');

        // Cek apakah user sudah pernah login sebelumnya
        window.addEventListener('load', () => {
            if (localStorage.getItem('isLoggedIn') === 'true') {
                showDashboard();
            }
        });

        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const user = document.getElementById('username_input').value;
            const pass = document.getElementById('password_input').value;

            // Ganti ini dengan Username & Password Mas
            if (user === "admin" && pass === "papua123") {
                localStorage.setItem('isLoggedIn', 'true'); // Simpan status
                showDashboard();
            } else {
                alert("Username atau Password Salah!");
            }
        };

        window.prosesLogout = () => {
            localStorage.removeItem('isLoggedIn'); // Hapus ingatan login
            location.reload(); // Refresh balik ke halaman login
        };

        function showDashboard() {
            overlay.classList.add('hidden');
            topBar.classList.remove('hidden');
            appContent.classList.remove('hidden');
        }

        // --- NAVIGATION LOGIC ---
        window.tampilkanView = (viewId) => {
            document.getElementById('welcome-view').classList.add('hidden');
            document.getElementById('input-view').classList.add('hidden');
            document.getElementById('database-view').classList.add('hidden');
            document.getElementById(viewId).classList.remove('hidden');
        };

        // --- CLOCK LOGIC ---
        setInterval(() => {
            const now = new Date();
            document.getElementById('display-clock').innerText = now.toLocaleTimeString('id-ID');
            document.getElementById('display-date').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }, 1000);
    </script>
</body>
</html>
