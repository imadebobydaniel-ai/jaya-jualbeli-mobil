<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Stok - Administrator JAYA MOBIL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --input-bg: #222;
            --text-light: #f4f4f4;
            --green: #2ecc71;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-light);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
        }

        .sidebar {
            width: 250px;
            height: 100vh;
            background: #000;
            padding: 20px;
            border-right: 1px solid #222;
            position: fixed;
        }

        .main-content {
            margin-left: 250px;
            padding: 40px;
            width: 100%;
        }

        .form-container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            max-width: 800px;
            border: 1px solid #333;
            margin-bottom: 30px;
        }

        h2 { color: var(--gold); margin-bottom: 25px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #bbb; font-size: 14px; }

        input {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--gold); }

        /* Kelas tombol untuk Event Listener */
        .btn-tambah {
            background: var(--green);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-tambah:hover { opacity: 0.8; transform: translateY(-2px); }

        .spec-box {
            background: #111;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--gold);
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h3 style="color:var(--gold)">JAYA MOBIL</h3>
    <p style="font-size: 12px; color: #666;">ADMINISTRATOR</p>
    <hr style="border: 0; border-top: 1px solid #222; margin: 20px 0;">
    <a href="#" style="color:var(--gold); text-decoration:none;"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
</div>

<div class="main-content">
    <div class="form-container">
        <h2><i class="fas fa-plus-square"></i> Tambah Unit Cepat</h2>
        <p style="color: #888; font-size: 14px; margin-bottom: 20px;">Input nama dan harga di sini untuk melanjutkan ke pengisian detail spesifikasi.</p>
        
        <div class="form-group">
            <label>Nama Mobil</label>
            <input type="text" id="namaMobil" placeholder="Contoh: Porsche 911">
        </div>

        <div class="form-group">
            <label>Harga (M/Jt)</label>
            <input type="text" id="hargaMobil" placeholder="Contoh: 2.45M">
        </div>

        <button type="button" class="btn-tambah">Tambah</button>
    </div>

    <div class="form-container">
        <h3>Daftar Unit Tersedia</h3>
        <div id="stokContainer">
            </div>
    </div>
</div>

<script>
    // --- PENANGANAN TOMBOL TAMBAH (SOLUSI FREEZE) ---
    const btnTambah = document.querySelector('.btn-tambah');
    
    if (btnTambah) {
        btnTambah.addEventListener('click', function() {
            const nama = document.getElementById('namaMobil').value;
            const harga = document.getElementById('hargaMobil').value;

            if (nama === "" || harga === "") {
                alert("Mohon isi Nama Mobil dan Harga terlebih dahulu.");
                return;
            }

            // Simpan ke sessionStorage untuk dibawa ke halaman detail
            sessionStorage.setItem('temp_nama', nama);
            sessionStorage.setItem('temp_harga', harga);

            // Pindah ke halaman detail
            window.location.href = 'tambah-unit.html';
        });
    }

    // Fungsi tambahan untuk menampilkan data yang sudah ada (opsional)
    window.onload = function() {
        const container = document.getElementById('stokContainer');
        let stok = JSON.parse(localStorage.getItem('car_stok')) || [];
        
        if (stok.length === 0) {
            container.innerHTML = "<p style='color:#666'>Belum ada unit di katalog.</p>";
        } else {
            let html = "<table style='width:100%; border-collapse: collapse;'>";
            stok.forEach(item => {
                html += `<tr style='border-bottom: 1px solid #333;'>
                            <td style='padding:10px'>${item.name}</td>
                            <td style='padding:10px; color:var(--gold)'>Rp ${item.price}</td>
                         </tr>`;
            });
            html += "</table>";
            container.innerHTML = html;
        }
    };
</script>

</body>
</html>
