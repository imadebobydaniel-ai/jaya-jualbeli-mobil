<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - JAYA MOBIL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #121212; color: white; font-family: sans-serif; padding: 40px; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #D4AF37; padding-bottom: 20px; }
        .card-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .stat-card { background: #1e1e1e; padding: 20px; border-radius: 10px; border-left: 5px solid #D4AF37; }
        table { width: 100%; margin-top: 40px; border-collapse: collapse; background: #1e1e1e; border-radius: 10px; overflow: hidden; }
        th { background: #D4AF37; color: black; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #333; }
        .btn-add { background: #22c55e; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="dashboard-header">
    <h1><i class="fas fa-tools"></i> Dashboard Admin JAYA</h1>
    <a href="index.html" style="color: #D4AF37; text-decoration: none;">Kembali ke Website</a>
</div>

<div class="card-container">
    <div class="stat-card"><h3>Total Unit</h3><p>45 Mobil</p></div>
    <div class="stat-card"><h3>Unit Terjual</h3><p>12 Mobil</p></div>
    <div class="stat-card"><h3>Pesan Masuk</h3><p>8 Baru</p></div>
</div>

<div style="margin-top: 40px;">
    <button class="btn-add"><i class="fas fa-plus"></i> Tambah Mobil Baru</button>
</div>

<table>
    <thead>
        <tr>
            <th>No</th>
            <th>Nama Mobil</th>
            <th>Tahun</th>
            <th>Harga</th>
            <th>Status</th>
            <th>Aksi</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>1</td>
            <td>Porsche 911 Carrera</td>
            <td>2021</td>
            <td>Rp 2.450M</td>
            <td><span style="color: #22c55e;">Tersedia</span></td>
            <td>
                <button style="background: #3b82f6; color: white; border:none; padding: 5px 10px; border-radius: 3px;">Edit</button>
                <button style="background: #ef4444; color: white; border:none; padding: 5px 10px; border-radius: 3px;">Hapus</button>
            </td>
        </tr>
    </tbody>
</table>

</body>
</html>
