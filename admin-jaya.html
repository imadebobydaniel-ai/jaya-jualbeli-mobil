<div id="ai-settings" class="page-section" style="display:none;">
    <h1><i class="fas fa-robot"></i> Pengaturan Robot AI</h1>
    <div class="admin-section">
        <h3 style="color: var(--gold);">Konfigurasi Chatbot</h3>
        <p style="color: #999; font-size: 14px;">Atur bagaimana AI berinteraksi dengan calon pembeli di website Anda.</p>
        
        <div style="margin-top: 20px;">
            <label style="display:block; margin-bottom: 8px;">API Key (Gemini/OpenAI):</label>
            <input type="password" id="ai-api-key" placeholder="Masukkan API Key Anda..." 
                   style="width: 100%; padding: 12px; background: #0a0a0a; border: 1px solid #333; color: white; border-radius: 8px;">
        </div>

        <div style="margin-top: 20px;">
            <label style="display:block; margin-bottom: 8px;">Instruksi Sistem (System Prompt):</label>
            <textarea id="ai-prompt" rows="6" placeholder="Contoh: Anda adalah asisten penjualan Jaya Mobil yang ramah..." 
                      style="width: 100%; padding: 12px; background: #0a0a0a; border: 1px solid #333; color: white; border-radius: 8px; font-family: inherit;"></textarea>
        </div>

        <div style="margin-top: 20px; display: flex; gap: 10px;">
            <button class="btn-primary" onclick="saveAISettings()">
                <i class="fas fa-save"></i> Simpan Konfigurasi
            </button>
            <button class="btn-cancel" onclick="resetAIPrompt()" style="background: #222; width: auto; padding: 0 20px;">
                Reset ke Default
            </button>
        </div>
    </div>
</div>
